name: Daily Prompt Cron

on:
  schedule:
    # 06:00 UTC = 08:00 Madrid (CEST). Ajustar a 05:00 UTC en invierno (CET).
    - cron: "0 6 * * *"
  workflow_dispatch: # permite lanzarlo manualmente desde GitHub Actions

jobs:
  run-prompts:
    name: Ejecutar prompts diarios
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run cron script
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_HTTP_REFERER: ${{ secrets.OPENROUTER_HTTP_REFERER }}
          OPENROUTER_APP_NAME: ${{ secrets.OPENROUTER_APP_NAME }}
        run: npx tsx scripts/run-cron-now.mts
